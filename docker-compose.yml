# ── Manifold – Docker Compose ───────────────────────────────
# Image-based deployment: uses pre-built GHCR images by default.
# Only the web (Caddy) service exposes a public port.
#
# To use locally-built images instead, override:
#   MANIFOLD_IMAGE=manifold-api:local
#   MANIFOLD_WEB_IMAGE=manifold-web:local
# ────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: manifold
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine

  api:
    image: ${MANIFOLD_IMAGE:-ghcr.io/agentic2026/manifold:latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/manifold
      H4CKATH0N_DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/manifold
      H4CKATH0N_REDIS_URL: redis://redis:6379
      H4CKATH0N_ORIGIN: ${H4CKATH0N_ORIGIN:-http://localhost:${WEB_PORT:-8080}}
      H4CKATH0N_APP_BASE_URL: ${H4CKATH0N_APP_BASE_URL:-http://localhost:${WEB_PORT:-8080}}
    volumes:
      - uploads:/app/.h4ckath0n_storage
      - email_outbox:/app/.h4ckath0n_email_outbox
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: ${MANIFOLD_IMAGE:-ghcr.io/agentic2026/manifold:latest}
    command: ["uv", "run", "python", "-m", "h4ckath0n", "jobs", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/manifold
      H4CKATH0N_DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/manifold
      H4CKATH0N_REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/.h4ckath0n_storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: ${MANIFOLD_WEB_IMAGE:-ghcr.io/agentic2026/manifold-web:latest}
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      BACKEND_URL: api:8000
      WEB_PORT: "8080"
    depends_on:
      - api

  cadvisor:
    image: ghcr.io/agentic2026/cadvisor:latest
    command:
      - --storage_driver=httpapi
      - --storage_driver_buffer_duration=15s
      - --housekeeping_interval=15s
    environment:
      CADVISOR_METRICS_API_URL: http://api:8000/cadvisor/batch
      CADVISOR_METRICS_API_TOKEN: ${CADVISOR_METRICS_API_TOKEN:-my-secret-token}
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  email_outbox:
