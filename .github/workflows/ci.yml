name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

permissions:
  contents: read
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Lint, typecheck, and unit tests
  # ──────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Generate OpenAPI types
        run: npm run gen
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Unit tests
        run: npm run test
        working-directory: web

  # ──────────────────────────────────────────────
  # Backend unit tests (pytest)
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --locked --all-extras
        working-directory: api

      - name: Run pytest
        run: uv run pytest tests/ -v
        working-directory: api
        env:
          CADVISOR_METRICS_API_TOKEN: "test-secret-123"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"


  # ──────────────────────────────────────────────
  # E2E tests with Playwright
  # ──────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install backend dependencies
        run: uv sync --locked --all-extras
        working-directory: api

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: web
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Build & push multi-arch Docker images
  # ──────────────────────────────────────────────
  build-api:
    name: Build API (${{ matrix.platform }})
    needs: [test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.API_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=api-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=api-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: api-digest-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-web:
    name: Build Web (${{ matrix.platform }})
    needs: [test, backend-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.WEB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=web-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=web-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: web-digest-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ──────────────────────────────────────────────
  # Merge per-arch digests into multi-arch manifests
  # ──────────────────────────────────────────────
  merge-api:
    name: Merge API Manifest
    needs: build-api
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: api-digest-*
          merge-multiple: true
          path: ${{ runner.temp }}/digests

      - uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        run: |
          cd "${{ runner.temp }}/digests"
          DIGEST_ARGS=$(printf '${{ env.API_IMAGE }}@sha256:%s ' *)
          docker buildx imagetools create \
            -t "${{ env.API_IMAGE }}:latest" \
            -t "${{ env.API_IMAGE }}:sha-${GITHUB_SHA::7}" \
            $DIGEST_ARGS

  merge-web:
    name: Merge Web Manifest
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: web-digest-*
          merge-multiple: true
          path: ${{ runner.temp }}/digests

      - uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        run: |
          cd "${{ runner.temp }}/digests"
          DIGEST_ARGS=$(printf '${{ env.WEB_IMAGE }}@sha256:%s ' *)
          docker buildx imagetools create \
            -t "${{ env.WEB_IMAGE }}:latest" \
            -t "${{ env.WEB_IMAGE }}:sha-${GITHUB_SHA::7}" \
            $DIGEST_ARGS
