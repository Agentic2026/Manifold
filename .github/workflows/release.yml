# ── Manifold release workflow ───────────────────────────────
# Builds and publishes multi-arch Docker images to GHCR on:
#   - push of a v* tag  (production release)
#   - manual dispatch    (dev/test release)
# ────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write          # for provenance / attestation

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/agentic2026/manifold
  WEB_IMAGE: ghcr.io/agentic2026/manifold-web

jobs:
  # ── 1. Version metadata ────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      image_tag: ${{ steps.v.outputs.image_tag }}
      dev_tag: ${{ steps.v.outputs.dev_tag }}
      sha: ${{ steps.v.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: v
        run: python scripts/ci/compute_version.py >> "$GITHUB_OUTPUT"

  # ── 2. Build frontend artifact ─────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: bash scripts/ci/package_frontend.sh /tmp
      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: /tmp/frontend.tar.xz

  # ── 3. Backend image ───────────────────────────────────────
  backend-image:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            VCS_REF=${{ needs.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  # ── 4. Web image ───────────────────────────────────────────
  web-image:
    needs: [version, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: /tmp

      # Extract pre-built frontend into web/dist
      - run: |
          mkdir -p web/dist
          tar -xJf /tmp/frontend.tar.xz -C web

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          target: release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            VCS_REF=${{ needs.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  # ── 5. Vulnerability scan ──────────────────────────────────
  scan:
    needs: [backend-image, web-image, version]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: backend
            ref: ghcr.io/agentic2026/manifold
          - name: web
            ref: ghcr.io/agentic2026/manifold-web
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: "${{ matrix.image.ref }}:sha-${{ needs.version.outputs.sha }}"
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
